project:
  name: Blueprint Engine
  version: 0.1.0
  description: AI-powered blueprint generation framework
  license: Apache-2.0
  repository: blueprint-engine

engine:
  default_template: standard
  validation: true
  inheritance: true
  autosave: true
  versioning: semantic

exports:
  - json
  - markdown
  - yaml
  - txt

templates:
  path: templates/
  schema: schemas/

storage:
  local: true
  database: sqlite

ai:
  provider: configurable
  temperature: 0.7
  max_tokens: 4096

logging:
  level: info
  file: logs/engine.log
